<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshRoutes Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; margin: 0; background-color: #f4f7f6; color: #333; }
        .header { background: #2ed573; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; }
        .logout-btn { background: white; color: #2ed573; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: 600; }
        .container { max-width: 1200px; margin: 40px auto; display: flex; gap: 30px; padding: 0 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); flex: 1; }
        h2 { margin-top: 0; color: #2ed573; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        /* Form */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button[type="submit"] { background: #2ed573; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        
        /* Orders */
        .order-card { border: 1px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .order-header { display: flex; justify-content: space-between; font-weight: 600; margin-bottom: 10px; color: #555; }
        .order-items { font-size: 14px; margin-bottom: 10px; }
        .status-badge { background: #ffeaa7; color: #d35400; padding: 5px 10px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>

<div class="header">
    <h1>FreshRoutes Admin</h1>
    <button class="btn btn-light text-success fw-bold logout-btn" onclick="logout()">Logout</button>
</div>

<div class="container">
    <!-- Add Product -->
    <div class="card">
        <h2>Add New Product</h2>
        <form id="addProductForm">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="pName" required>
            </div>
            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" id="pPrice" required>
            </div>
            <div class="form-group">
                <label>Old Price (Optional)</label>
                <input type="number" id="pOldPrice">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="pCategory">
                    <option>Fruits</option>
                    <option>Vegetables</option>
                    <option>Dairy</option>
                    <option>Beverages</option>
                    <option>Snacks</option>
                </select>
            </div>
            <div class="form-group">
                <label>Image URL (e.g., images/apple.png)</label>
                <input type="text" id="pImage" required value="images/apple.png">
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold mt-2">Add Product</button>
        </form>
    </div>

    <!-- View Orders -->
    <div class="card" style="flex: 2;">
        <h2>Recent Orders</h2>
        <div id="ordersContainer">
            Loading orders...
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="admin.js"></script>
</body>
</html>
